<!doctype html>
<html lang="en">
  <head>
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('ui-lab-theme') || localStorage.getItem('isocourt-theme')
          var mode = t === 'light' || t === 'dark' ? t : 'system'
          document.documentElement.setAttribute('data-color-mode', mode)
          var dark =
            mode === 'dark' ||
            (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {
          document.documentElement.setAttribute('data-color-mode', 'system')
          document.documentElement.classList.toggle(
            'dark',
            window.matchMedia('(prefers-color-scheme: dark)').matches,
          )
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Local UI lab: compare design kits, sketch flows, poll and comment on panes, and hand off to agents without leaving the browser."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <title>UI lab</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
